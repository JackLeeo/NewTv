name: tvbox
description: TVBox video player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.0
  hive_ce: ^2.19.3
  path_provider: ^2.1.5
  cached_network_image_ce: ^4.7.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  connectivity_plus: ^7.1.1
  window_manager: ^0.4.0
  url_launcher: ^6.3.1
  flutter_smart_dialog: ^4.9.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/nodejs-project/dist/
    - assets/nodejs-project/src/
    - assets/nodejs-project/src/spider/
    - assets/nodejs-project/src/spider/video/
    - assets/nodejs-project/src/spider/book/
    - assets/nodejs-project/src/spider/pan/
    - assets/nodejs-project/src/util/
    # 嵌入 Node.js 运行时（v20.11.1）—— 这样应用不依赖系统安装 Node.js
    # 启动时由 NodeJSManager 从 rootBundle 复制到 getApplicationSupportDirectory()
    - assets/nodejs-runtime/

dependency_overrides:
  media_kit_libs_windows_video:
    path: .local_plugins/media_kit_libs_windows_video
